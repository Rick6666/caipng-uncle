                  - text: )
                - code [ref=f1e198]: "--- description: \"为AiReddit插件创建一个新的React组件\" --- 请在 src/components/ 目录下，创建一个名为 $ARGUMENTS.tsx 的新文件。组件需要使用Tailwind CSS，并导出一个基础的React函数组件。"
                - paragraph [ref=f1e199]:
                  - text: 使用：
                  - code [ref=f1e200]: /create-component ReplySuggestionPanel
                - paragraph [ref=f1e201]:
                  - generic [ref=f1e202]: 将高频、重复的任务流封装成自定义命令，能将多步操作简化为一行指令
                  - text: ，极大提升开发效率。
