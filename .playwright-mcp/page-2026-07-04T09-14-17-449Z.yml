                  - code [ref=f1e124]: CLAUDE.md
                  - text: ：给AI注入项目“灵魂”
                - paragraph [ref=f1e125]:
                  - text: 这是启动任何项目前的必做项 。我在项目根目录创建了
                  - code [ref=f1e126]: CLAUDE.md
                  - text: ，把插件的核心信息都写了进去。
                - code [ref=f1e129]: "# 项目基础信息：AiReddit 浏览器插件 - 技术栈：Next.js, TypeScript, Tailwind CSS, Chrome Extension Manifest V3 - 核心功能：AI内容本地化、AI回复建议、社区规则解读 - 目标平台：Reddit # 代码规范 - 组件使用 PascalCase 命名 - API请求函数必须使用 try-catch 包裹 # 注意事项 - 所有与Chrome API交互的代码，必须在 content-script.js 或 background.js 中处理。"
                - heading "3. 全局提示词 (/memory)：为AI装上“审视之眼”" [level=3] [ref=f1e130]:
                  - text: 3. 全局提示词 (
                  - code [ref=f1e131]: /memory
                  - text: )：为AI装上“审视之眼”
                - paragraph [ref=f1e132]:
                  - text: 有时候，
                  - generic [ref=f1e133]: 不是 AI 不行，是需求方没想好自己要干嘛导致效率低。
                - paragraph [ref=f1e134]: 解决方案就是这“自虐式”提示词：
                - code [ref=f1e137]: 用中文回答。每次都用审视的目光，仔细看我输入的潜在问题，你要指出我的问题，并给出明显在我思考框架之外的建议。如果你觉得我说的太离谱了，你就骂回来，帮我瞬间清醒。
                - paragraph [ref=f1e138]:
                  - text: 它能
                  - generic [ref=f1e139]: 有效防止我提出模糊或不切实际的需求
                  - text: ，让AI从一个被动的执行者，变成一个主动的、有批判性思维的协作伙伴。
                - heading "4. Git版本控制：唯一“后悔药”" [level=3] [ref=f1e140]
                - paragraph [ref=f1e141]: Claude Code没有内置版本管理。
                - list [ref=f1e142]:
                  - listitem [ref=f1e143]: • 开箱即用实践：
                  - list [ref=f1e144]:
                    - listitem [ref=f1e145]:
                      - text: •
                      - code [ref=f1e146]: git init
                      - text: ：项目开始时立刻初始化。
                    - listitem [ref=f1e147]:
                      - text: •
                      - code [ref=f1e148]:
                        - text: "git commit -m \"feat: implement"
                        - link "RedNote2Reddit" [ref=f1e150] [cursor=pointer]:
