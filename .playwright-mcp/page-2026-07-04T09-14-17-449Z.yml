                      - text: •
                      - code [ref=f1e154]: git checkout -b feature/ai-reply-suggestion
                      - text: ：开发新功能（如“AI回复建议”）时，创建新分支。
                - paragraph [ref=f1e155]:
                  - text: 当AI把代码改崩时，
                  - code [ref=f1e156]: git reset --hard
                  - text: 能让你一秒回到解放前。
                - heading "第二章：核心工作流——从需求到代码的丝滑闭环" [level=3] [ref=f1e157]
                - heading "5. 交互模式切换 (Shift + Tab)：三板斧应对不同场景" [level=3] [ref=f1e158]:
                  - text: 5. 交互模式切换 (
                  - code [ref=f1e159]: Shift + Tab
                  - text: )：三板斧应对不同场景
                - paragraph [ref=f1e160]: 这是我用得最高频的快捷键。
                - list [ref=f1e161]:
                  - listitem [ref=f1e162]: • 开箱即用实践：
                  - list [ref=f1e163]:
                    - listitem [ref=f1e164]: • 规划阶段：切换到计划模式 (Plan Mode)，让AI先为“社区规则解读”功能出具详细的实现步骤。
                    - listitem [ref=f1e165]: • 执行阶段：确认计划后，切换到自动接受编辑 (Auto-Accept Edits)，让它批量生成代码。
                    - listitem [ref=f1e166]: • 调试阶段：切换回一般模式，进行精细的手动确认和修改。
                - paragraph [ref=f1e167]: 根据任务阶段选择合适的模式，能极大提升效率，避免在规划时陷入代码细节，或在执行时被反复确认打断。
                - heading "6. 探索-计划 (think 模式)：先谋后动，谋定后动" [level=3] [ref=f1e168]:
                  - text: 6. 探索-计划 (
                  - code [ref=f1e169]: think
                  - text: 模式)：先谋后动，谋定后动
                - paragraph [ref=f1e170]: 对于插件的复杂功能，比如“发帖建议分析”，我不会直接让它写代码。
                - paragraph [ref=f1e171]: 而是：
                - code [ref=f1e174]: "ultrathink hard: 为“发帖建议分析”功能制定一个详细计划。需要分析当前subreddit的热门帖子，提炼主题和标题模式，并结合用户输入的产品名，生成3个不同的发帖角度。将计划保存到 planning/post-suggestion.md。"
                - paragraph [ref=f1e175]:
                  - generic [ref=f1e176]: 使用
                  - code [ref=f1e177]: "**<u>think</u>**"
                  - generic [ref=f1e178]: ","
                  - code [ref=f1e179]: "**<u>think hard</u>**"
                  - generic [ref=f1e180]: ","
                  - code [ref=f1e181]: "**<u>ultrathink</u>**"
                  - generic [ref=f1e182]: 等关键词，可以控制AI的“思考预算”。强制AI先输出详细计划，可以确保它的实现路径是正确的，避免一开始就走偏，浪费大量时间和Token。
                - heading "7. 测试驱动开发 (TDD)" [level=3] [ref=f1e183]
                - paragraph [ref=f1e184]:
                  - text: 这是
                  - generic [ref=f1e185]: 防止AI“自由发挥”的最强手段。
                - paragraph [ref=f1e186]: 在开发“RedNote2Reddit”中的文本提取函数时，我先写了测试：
                - code [ref=f1e189]: "// utils/parser.test.js test('should extract title and content from RedNote HTML', () => { ... }); 我们正在进行TDD。请在 utils/parser.js 中实现 parseRedNoteHTML 函数，让它能通过这个测试。不要修改测试文件。"
                - paragraph [ref=f1e190]:
                  - generic [ref=f1e191]: 测试用例为AI提供了一个清晰、客观、唯一的完成标准。
                  - text: 它的所有代码修改都必须为了“让测试变绿”，极大地约束了其行为，保证了代码质量。
                - heading "8. 自定义Slash命令：封装你的重复工作" [level=3] [ref=f1e192]
