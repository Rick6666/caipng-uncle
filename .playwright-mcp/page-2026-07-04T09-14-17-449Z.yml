                  - text: 状态设为
                  - code [ref=f1e234]: "false"
                  - text: ，并显示一条错误提示。”
                - heading "12. 刨根问底：别怕问“白痴”问题" [level=3] [ref=f1e235]
                - paragraph [ref=f1e236]:
                  - text: 当我搞不懂
                  - code [ref=f1e237]: chrome.runtime.sendMessage
                  - text: 的异步回调时。
                - list [ref=f1e238]:
                  - listitem [ref=f1e239]: • 开箱即用实践：
                - code [ref=f1e242]: 我是一个完全不懂Chrome插件开发的后端程序员。请用一个寄快递的例子，解释 background.js 和 content-script.js 之间为什么要用 sendMessage 通信，以及回调函数扮演了什么角色。
                - paragraph [ref=f1e243]: 不要假装你看懂了。把AI当成一个耐心的老师，反复追问，直到你真正理解为止。很多深层次的bug，都源于对基础概念的模糊理解。
                - heading "13. 上下文管理 (/clear, /compact)：保持对话“干净”" [level=3] [ref=f1e244]:
                  - text: 13. 上下文管理 (
                  - code [ref=f1e245]: /clear
                  - text: ","
                  - code [ref=f1e246]: /compact
                  - text: )：保持对话“干净”
                - paragraph [ref=f1e247]:
                  - text: 在完成了“AI回复建议”功能后，准备开始做“社区规则解读”前，我会先用
                  - code [ref=f1e248]: /clear
                  - text: 。
                - paragraph [ref=f1e249]: 可以有效防止旧的、不相关的上下文信息干扰AI对新任务的理解。
                - heading "14. 多种数据输入方式：灵活投喂" [level=3] [ref=f1e250]
                - list [ref=f1e251]:
                  - listitem [ref=f1e252]:
                    - text: •
                    - code [ref=f1e253]: "**cat error.log | claude \"分析错误\"**"
                    - text: ": 管道输入，处理日志。"
                  - listitem [ref=f1e254]:
                    - text: •
                    - code [ref=f1e255]: "**@/src/utils/api.js**"
                    - text: ": @文件，让AI阅读特定文件。"
                  - listitem [ref=f1e256]:
                    - text: •
                    - code [ref=f1e257]: "**/path/to/design.png**"
                    - text: ": 输入图片路径，让AI看UI设计稿。"
                - heading "15. 回滚 (回滚, 撤销)：一键撤销AI的“骚操作”" [level=3] [ref=f1e258]:
                  - text: 15. 回滚 (
                  - code [ref=f1e259]: 回滚
                  - text: ","
                  - code [ref=f1e260]: 撤销
                  - text: )：一键撤销AI的“骚操作”
                - paragraph [ref=f1e261]: 当AI自作主张删掉了一个关键函数时，直接输入“回滚”。
                - paragraph [ref=f1e262]:
                  - text: 这是比
                  - code [ref=f1e263]: git reset
                  - text: 更轻量级的撤销方式，专门用于回退AI在当前会话中 的文件修改。
                - heading "16. 历史消息 (ESC x 2)：快速复用指令" [level=3] [ref=f1e264]:
                  - text: 16. 历史消息 (
                  - code [ref=f1e265]: ESC
                  - text: x 2)：快速复用指令
                - paragraph [ref=f1e266]:
                  - text: 连续按两次
                  - code [ref=f1e267]: ESC
                  - text: ，可以快速调出并重新编辑之前的指令。
                - heading "第四章：扩展与自动化——突破边界，解放双手" [level=3] [ref=f1e268]
                - heading "17. MCP集成：扩展能力" [level=3] [ref=f1e269]:
                  - generic [ref=f1e270]:
                    - text: "17."
                    - link "MCP集成" [ref=f1e272] [cursor=pointer]:
                      - /url: https://zhida.zhihu.com/search?content_id=260945816&content_type=Article&match_order=1&q=MCP%E9%9B%86%E6%88%90&zd_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJ6aGlkYV9zZXJ2ZXIiLCJleHAiOjE3ODMzMjkyNTUsInEiOiJNQ1Dpm4bmiJAiLCJ6aGlkYV9zb3VyY2UiOiJlbnRpdHkiLCJjb250ZW50X2lkIjoyNjA5NDU4MTYsImNvbnRlbnRfdHlwZSI6IkFydGljbGUiLCJtYXRjaF9vcmRlciI6MSwiemRfdG9rZW4iOm51bGx9.9W505wR3KD35po9cOLHazuu0JomVLC7B46mpl2fLTZg&zhida_source=entity
                      - text: MCP集成
                      - img [ref=f1e273]
                    - text: ：扩展能力
                - paragraph [ref=f1e275]: 开发插件时，我集成了两个核心MCP。
                - list [ref=f1e276]:
                  - listitem [ref=f1e277]: • 开箱即用实践：
                  - list [ref=f1e278]:
                    - listitem [ref=f1e279]:
                      - text: •
                      - code [ref=f1e280]: "**context7**"
                      - text: ": “请使用"
                      - code [ref=f1e281]: context7
                      - text: ，告诉我最新版
                      - code [ref=f1e282]: react-query
                      - text: 中
                      - code [ref=f1e283]: useQuery
                      - text: 的
                      - code [ref=f1e284]: staleTime
                      - text: 和
                      - code [ref=f1e285]: cacheTime
                      - text: 选项有什么区别。”
                    - listitem [ref=f1e286]:
                      - text: •
                      - code [ref=f1e287]: "**puppeteer**"
                      - text: ": “使用"
                      - code [ref=f1e288]: puppeteer
                      - text: 打开这个Reddit帖子，截图整个评论区，分析评论的情绪倾向。”
                - paragraph [ref=f1e289]: MCP让Claude Code突破了自身知识库的限制，可以调用外部工具获取实时信息、执行浏览器操作，能力边界极大扩展。
                - heading "18. Bash模式 (!)：简单命令，无需动脑" [level=3] [ref=f1e290]:
                  - text: 18. Bash模式 (
                  - code [ref=f1e291]: "!"
                  - text: )：简单命令，无需动脑
                - paragraph [ref=f1e292]:
                  - text: 需要查看当前目录文件列表时，我直接用
                  - code [ref=f1e293]: "!ls -l"
                  - text: 。
                - list [ref=f1e294]:
                  - listitem [ref=f1e295]:
                    - text: • 为什么更好用：对于简单的shell命令，使用
                    - code [ref=f1e296]: "!"
                    - text: 前缀可以直接在bash中执行，无需经过大模型思考，速度快，不花钱。
                - paragraph [ref=f1e297]
                - figure [ref=f1e298]:
                  - img [ref=f1e300]
                - paragraph [ref=f1e301]
                - heading "19. 无头模式 (claude -p \"...\")：CI/CD集成" [level=3] [ref=f1e302]:
                  - text: 19. 无头模式 (
                  - code [ref=f1e303]: claude -p "..."
                  - text: )：CI/CD集成
                - paragraph [ref=f1e304]: 我将代码格式化检查加入了CI流程。
                - list [ref=f1e305]:
                  - listitem [ref=f1e306]: • 开箱即用实践 (package.json)：
                - code [ref=f1e309]: "\"scripts\": { \"lint:claude\": \"claude -p '检查所有暂存文件，报告不符合ESLint规范的地方。'\" }"
                - paragraph [ref=f1e310]: 无头模式让Claude Code可以作为自动化脚本的一部分被调用，实现代码的自动检查、修复和部署。
                - heading "20. Pre-Commit Hooks：提交前的最后一道防线" [level=3] [ref=f1e311]
                - paragraph [ref=f1e312]:
                  - text: 在
                  - code [ref=f1e313]: .git/hooks/pre-commit
                  - text: 中加入脚本，让Claude Code在每次提交前自动检查代码，保证入库代码质量。
                - heading "21. Claude Code Hooks：生命周期内的精细控制" [level=3] [ref=f1e314]
                - paragraph [ref=f1e315]:
                  - text: 我配置了一个
                  - code [ref=f1e316]: PostToolUse
                  - text: 钩子，在每次编辑完
                  - code [ref=f1e317]: .tsx
                  - text: 文件后自动运行Prettier。
                - list [ref=f1e318]:
                  - listitem [ref=f1e319]:
                    - text: • 开箱即用实践 (
                    - code [ref=f1e320]: .claude/settings.json
                    - text: )：
                - code [ref=f1e323]: "[[hooks]] event = \"PostToolUse\" [hooks.matcher] tool_name = \"edit_file\" file_paths = [\"src/**/*.tsx\"] command = \"prettier --write $CLAUDE_FILE_PATHS\""
                - paragraph [ref=f1e324]:
                  - text: Hooks提供了
                  - generic [ref=f1e325]: 在Claude Code执行流程中注入自定义逻辑的能力
                  - text: ，实现了更深层次的自动化。
                - heading "第五章：架构与重构——写出能维护的好代码" [level=3] [ref=f1e326]
                - heading "22. Roo Code + Claude Code：架构先行" [level=3] [ref=f1e327]:
                  - generic [ref=f1e328]:
                    - text: "22."
                    - link "Roo Code" [ref=f1e330] [cursor=pointer]:
                      - /url: https://zhida.zhihu.com/search?content_id=260945816&content_type=Article&match_order=1&q=Roo+Code&zd_token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJ6aGlkYV9zZXJ2ZXIiLCJleHAiOjE3ODMzMjkyNTUsInEiOiJSb28gQ29kZSIsInpoaWRhX3NvdXJjZSI6ImVudGl0eSIsImNvbnRlbnRfaWQiOjI2MDk0NTgxNiwiY29udGVudF90eXBlIjoiQXJ0aWNsZSIsIm1hdGNoX29yZGVyIjoxLCJ6ZF90b2tlbiI6bnVsbH0.P0ZY5PbXXCsx5p6FXP3bTLnDwNgU9EJ9DjdF1RMDFjQ&zhida_source=entity
                      - text: Roo Code
                      - img [ref=f1e331]
                    - text: + Claude Code：架构先行
                - paragraph [ref=f1e333]: 在设计插件的整体架构时，我先用了Roo Code。
                - paragraph [ref=f1e334]
                - figure [ref=f1e335]:
                  - img [ref=f1e337]
                - paragraph [ref=f1e338]
                - list [ref=f1e339]:
                  - listitem [ref=f1e340]: • 开箱即用实践：
                  - list [ref=f1e341]:
                    - listitem [ref=f1e342]:
                      - text: • 在VSCode中安装Roo Code插件，选择
                      - code [ref=f1e343]: Architect
                      - text: 模式。
                    - listitem [ref=f1e344]: • 与Roo Code对话，明确插件的模块划分（UI、内容脚本、背景服务、API通信）。
                    - listitem [ref=f1e345]: • 将Roo Code生成的架构图和Markdown文档，发给Claude Code，让它据此进行编码。
                - paragraph [ref=f1e346]:
                  - generic [ref=f1e347]: Roo Code擅长架构设计和可视化，Claude Code擅长代码实现。
                  - text: 分工合作，能确保项目从一开始就有清晰、合理的结构。
                - heading "23. 持续重构：别让AI的“代码屎山”埋了你" [level=3] [ref=f1e348]
                - paragraph [ref=f1e349]:
                  - text: 当发现
                  - code [ref=f1e350]: content-script.js
                  - text: 里的逻辑越来越臃肿时：
                - code [ref=f1e353]: 请分析 content-script.js 文件。它现在同时处理了DOM操作、API请求和状态缓存，逻辑混乱。请提出一个重构方案，将其拆分为三个独立的模块：dom-controller.js, api-handler.js, state-manager.js。先给我重构计划，不要直接动手。
                - paragraph [ref=f1e354]:
                  - text: AI在反复修改后容易产生“
                  - generic [ref=f1e355]: 代码熵增
                  - text: ”。定期、主动地让AI进行重构，是保持代码库健康、可维护的必要操作。
                - heading "24. 复杂逻辑拆分为微服务" [level=3] [ref=f1e356]
                - paragraph [ref=f1e357]: 如果“发帖建议分析”这个功能变得异常复杂，包含了多源数据采集、NLP处理、模型调用等，我会将其剥离。
                - paragraph [ref=f1e358]:
                  - generic [ref=f1e359]: 当单个文件或模块的逻辑复杂度超出AI能稳定处理的范畴时，将其拆分为独立的、通过HTTP通信的服务，是解决“AI幻觉”的根本手段。
                - heading "25. 学习设计模式和代码简洁之道" [level=3] [ref=f1e360]
                - paragraph [ref=f1e361]: 这是对使用者 的要求。你需要懂一些基本的设计原则。
                - code [ref=f1e364]: 你刚才为我生成了api-handler.js。请分析一下，这个实现符合哪些设计模式（如工厂模式、单例模式）？是否遵循了《代码简洁之道》中的单一职责原则？
                - paragraph [ref=f1e365]: 你对软件工程的理解深度，决定了AI 编程效果的上限。
                - heading "第六章：性能与协作——榨干最后一滴价值" [level=3] [ref=f1e366]
                - heading "26. Code Review模式：双Claude协作" [level=3] [ref=f1e367]
                - paragraph [ref=f1e368]: 我经常开两个终端窗口，一个用于编码，一个用于审查。
                - list [ref=f1e369]:
                  - listitem [ref=f1e370]: • 开箱即用实践：
                  - list [ref=f1e371]:
                    - listitem [ref=f1e372]:
                      - text: "• 终端1:"
                      - code [ref=f1e373]: claude "实现AI回复建议的UI界面"
                    - listitem [ref=f1e374]:
                      - text: "• 终端2:"
                      - code [ref=f1e375]: claude "请审查刚才实现的ReplySuggestionPanel.tsx组件，检查其代码风格和可复用性。"
                - paragraph [ref=f1e376]:
                  - generic [ref=f1e377]: 利用AI的“左右互搏”，能从不同角度发现代码中的潜在问题。
                - heading "27. 并行开发 (git worktree)：多个AI同时干活" [level=3] [ref=f1e378]:
                  - text: 27. 并行开发 (
                  - code [ref=f1e379]: git worktree
                  - text: )：多个AI同时干活
                - paragraph [ref=f1e380]: 当我要同时开发“UI美化”和“性能优化”两个功能时。
                - list [ref=f1e381]:
                  - listitem [ref=f1e382]: • 开箱即用实践：
                - code [ref=f1e385]: "git worktree add -b feature/ui-polish ../aireddit-ui git worktree add -b feature/performance ../aireddit-perf # 分别在两个新目录中启动Claude Code"
                - paragraph [ref=f1e386]:
                  - code [ref=f1e387]: git worktree
                  - text: 为并行开发提供了完美的、相互隔离的环境，让你能同时驱动多个Claude Code实例处理不同任务，极大提升开发吞吐量。
                - heading "28. IDE集成：在熟悉的环境中实践" [level=3] [ref=f1e388]
                - paragraph [ref=f1e389]: 我把Claude Code集成在了Cursor或VS Code的终端里，可以继续使用IDE原生的文件管理、代码高亮、调试等功能，取长补短。
                - heading "29. CLI快捷键（Emacs模式）" [level=3] [ref=f1e390]
                - list [ref=f1e391]:
                  - listitem [ref=f1e392]: • 开箱即用实践：
                  - list [ref=f1e393]:
                    - listitem [ref=f1e394]:
                      - text: •
                      - code [ref=f1e395]: Ctrl + A
                      - text: /
                      - code [ref=f1e396]: Ctrl + E
                      - text: ": 跳转行首/行尾。"
                    - listitem [ref=f1e397]:
                      - text: •
                      - code [ref=f1e398]: Ctrl + U
                      - text: /
                      - code [ref=f1e399]: Ctrl + K
                      - text: ": 删除整行/行尾内容。"
                - heading "30. 版本升级 (npm install -g ...)：永远使用最新版" [level=3] [ref=f1e400]:
                  - text: 30. 版本升级 (
                  - code [ref=f1e401]: npm install -g ...
                  - text: )：永远使用最新版
                - paragraph [ref=f1e402]: 定期运行升级命令，确保你用的是最新版的Claude Code。
                - separator [ref=f1e403]
                - paragraph [ref=f1e404]: 好了，以上就是我在开发AiReddit插件过程中，总结提炼出的30个榨干Claude Code的实战技巧。
                - paragraph [ref=f1e405]: 核心就一句话：你必须成为一个优秀的架构师和项目经理，才能把Claude Code这个能力超群但毫无经验的“实习生”，调教成你最得力的编程伙伴。
