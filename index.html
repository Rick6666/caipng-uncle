<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1e5c46">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>杂菜饭 Uncle · Cai Png Tycoon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍛</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- 顶部状态栏 -->
    <header id="hud" class="hidden">
      <div class="hud-item" id="hud-day">☀️ 第 1 天</div>
      <div class="hud-item money" id="hud-money">💰 $100</div>
      <div class="hud-item" id="hud-rep">⭐ 0</div>
    </header>
    <div id="rep-bar-wrap" class="hidden">
      <div id="rep-bar"><div id="rep-bar-fill"></div></div>
      <div id="rep-title">路边小摊</div>
    </div>

    <!-- 主内容区 -->
    <main id="screen"></main>

    <!-- 底部操作区 -->
    <footer id="actions"></footer>

    <!-- 飘字层 -->
    <div id="toast-layer"></div>
  </div>
  <script type="module" src="src/ui/app.js"></script>
</body>
</html>
